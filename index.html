<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Firma | Conectamos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: #0f1628;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { color: #fff; font-size: 18px; font-weight: 700; }
    header span { color: #00C9B1; font-size: 13px; font-weight: 500; }
    .container {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 32px;
      padding: 36px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .form-panel {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      height: fit-content;
    }
    .form-panel h2 {
      font-size: 15px;
      font-weight: 700;
      color: #0f1628;
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: 2px solid #00C9B1;
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .field input[type="text"] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input[type="text"]:focus { border-color: #00C9B1; }
    .photo-tabs {
      display: flex;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .photo-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      transition: all 0.2s;
    }
    .photo-tab.active { background: #00C9B1; color: #fff; }
    .photo-pane { display: none; }
    .photo-pane.active { display: block; }
    .file-upload-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border: 1.5px dashed #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      transition: border-color 0.2s, color 0.2s;
    }
    .file-upload-label:hover { border-color: #00C9B1; color: #00C9B1; }
    .file-upload-label input { display: none; }
    .url-row { display: flex; gap: 8px; }
    .url-row input[type="text"] {
      flex: 1;
      padding: 10px 13px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .url-row input[type="text"]:focus { border-color: #00C9B1; }
    .btn-usar {
      padding: 10px 16px;
      background: #00C9B1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .photo-status {
      font-size: 12px;
      color: #00C9B1;
      margin-top: 6px;
      min-height: 18px;
    }
    .photo-status.error { color: #e55; }
    .preview-panel { display: flex; flex-direction: column; gap: 20px; }
    .preview-panel h2 { font-size: 15px; font-weight: 700; color: #0f1628; }
    .preview-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: auto;
    }
    .copy-row { display: flex; flex-direction: column; gap: 8px; }
    .btn-copy {
      padding: 13px 28px;
      background: #0f1628;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #1c2d52; }
    .btn-copy.copied { background: #00C9B1; }
    .copy-hint { font-size: 12px; color: #aaa; line-height: 1.5; }

    /* ── Crop modal ── */
    #crop-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #crop-modal.open { display: flex; }
    #crop-dialog {
      background: #1a2a3a;
      border-radius: 16px;
      padding: 28px 32px;
      text-align: center;
      color: #fff;
      width: 340px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #crop-dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    #crop-dialog p  { font-size: 12px; color: #aaa; }
    #crop-circle {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #00C9B1;
      position: relative;
      cursor: move;
      margin: 18px auto;
      background: #0f1628;
      user-select: none;
      -webkit-user-select: none;
    }
    #crop-img { position: absolute; pointer-events: none; }
    .zoom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .zoom-row input[type="range"] { flex: 1; accent-color: #00C9B1; cursor: pointer; }
    .crop-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel-crop {
      padding: 10px 24px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-apply-crop {
      padding: 10px 24px;
      background: #00C9B1;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Crop modal -->
  <div id="crop-modal">
    <div id="crop-dialog">
      <h3>Ajustar foto</h3>
      <p>Arrastra para centrar &middot; Slider para zoom</p>
      <div id="crop-circle">
        <img id="crop-img" draggable="false" alt="" />
      </div>
      <div class="zoom-row">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <input type="range" id="zoom-slider" />
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <div class="crop-btns">
        <button class="btn-cancel-crop" onclick="cancelCrop()">Cancelar</button>
        <button class="btn-apply-crop" onclick="applyCrop()">Aplicar</button>
      </div>
    </div>
  </div>

  <header>
    <h1>Generador de Firma Corporativa</h1>
    <span>Conectamos</span>
  </header>

  <div class="container">

    <div class="form-panel">
      <h2>Tus datos</h2>

      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="inp-nombre" placeholder="Ej. Nombre(s) Apellidos" />
      </div>

      <div class="field">
        <label>Área / Departamento</label>
        <input type="text" id="inp-area" placeholder="Ej. Área o Departamento" />
      </div>

      <div class="field">
        <label>WhatsApp</label>
        <input type="text" id="inp-whatsapp" placeholder="Ej. 55 1234 5678" />
      </div>

      <div class="field">
        <label>Foto de perfil</label>
        <div class="photo-tabs">
          <button class="photo-tab active" onclick="switchTab('file')">Subir archivo</button>
          <button class="photo-tab" onclick="switchTab('url')">Pegar URL</button>
        </div>

        <div class="photo-pane active" id="pane-file">
          <label class="file-upload-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="file-label-text">Seleccionar imagen…</span>
            <input type="file" id="inp-file" accept="image/*" onchange="handleFileChange(this)" />
          </label>
        </div>

        <div class="photo-pane" id="pane-url">
          <div class="url-row">
            <input type="text" id="inp-url" placeholder="https://…" />
            <button class="btn-usar" onclick="handleUrlLoad()">Usar</button>
          </div>
        </div>

        <div class="photo-status" id="photo-status"></div>
      </div>
    </div>

    <div class="preview-panel">
      <h2>Vista previa</h2>
      <div class="preview-box" id="preview-box"></div>
      <div class="copy-row">
        <button class="btn-copy" id="btn-copy" onclick="copyHTML()">Copiar HTML para Gmail</button>
        <p class="copy-hint">
          Abre Gmail → Configuración → Ver toda la configuración → General → Firma → pega con Ctrl+V
        </p>
      </div>
    </div>

  </div>

  <script>
    const WEBSITE = 'https://conectamos.ai/';
    const ADDR1   = 'Oficina 702, Laguna de Terminos 221';
    const ADDR2   = 'Torre A. Miguel Hidalgo, 11520 CDMX.';

    let photoData = '';

    const SVG_WA    = `<img src="https://firmas-conectamos.vercel.app/whatsapp.svg" width="22" height="22" style="display:block;" alt="" />`;
    const SVG_GLOBE = `<img src="https://firmas-conectamos.vercel.app/globe.svg" width="22" height="22" style="display:block;" alt="" />`;
    const SVG_PIN   = `<img src="https://firmas-conectamos.vercel.app/pin.svg" width="22" height="22" style="display:block;" alt="" />`;

    const LOGO_URL = 'https://firmas-conectamos.vercel.app/logotipo.svg';

    function generateSignatureHTML() {
      const name     = document.getElementById('inp-nombre').value.trim();
      const area     = document.getElementById('inp-area').value.trim();
      const whatsapp = document.getElementById('inp-whatsapp').value.trim();

      const photoCell = photoData
        ? `<img src="${photoData}" width="110" height="110" style="display:block;width:110px;height:110px;border-radius:50%;border:3px solid #00C9B1;" />`
        : `<div style="width:104px;height:104px;border-radius:50%;border:3px solid #00C9B1;background:#2a3a5c;"></div>`;

      return `<table cellpadding="0" cellspacing="0" border="0" style="background:linear-gradient(to bottom, #0c1928 0%, #1e3f56 30%, #3a6e78 58%, #a8d4d6 80%, #f2fafa 100%);padding:24px 32px;border-radius:10px;font-family:Arial,Helvetica,sans-serif;">` +
        `<tr>` +
          `<td style="padding-right:28px;vertical-align:middle;">${photoCell}</td>` +
          `<td style="vertical-align:top;padding-top:4px;">` +
            `<p style="margin:0 0 4px 0;font-size:18px;font-weight:bold;color:#ffffff;white-space:nowrap;">${name || 'Tu nombre'}</p>` +
            `<p style="margin:0 0 18px 0;font-size:14px;font-style:italic;color:#00C9B1;">${area || 'Tu área'}</p>` +
            `<table cellpadding="0" cellspacing="0" border="0">` +
              `<tr>` +
                `<td style="padding-right:12px;vertical-align:middle;padding-bottom:12px;">${SVG_WA}</td>` +
                `<td style="font-size:15px;color:#ffffff;font-weight:bold;padding-bottom:12px;white-space:nowrap;">${whatsapp || '-- ---- ----'}</td>` +
              `</tr>` +
              `<tr>` +
                `<td style="padding-right:12px;vertical-align:middle;padding-bottom:12px;">${SVG_GLOBE}</td>` +
                `<td style="font-size:14px;color:#ffffff;font-weight:bold;padding-bottom:12px;">${WEBSITE}</td>` +
              `</tr>` +
              `<tr>` +
                `<td style="padding-right:12px;vertical-align:top;">${SVG_PIN}</td>` +
                `<td style="font-size:13px;color:#ffffff;line-height:1.6;white-space:nowrap;">${ADDR1}<br>${ADDR2}</td>` +
              `</tr>` +
            `</table>` +
          `</td>` +
          `<td style="vertical-align:middle;padding-left:32px;text-align:center;">` +
            `<img src="${LOGO_URL}" width="240" style="display:block;width:240px;height:auto;margin:0 auto 12px auto;" alt="Conectamos" />` +
            `<table cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">` +
              `<tr>` +
                `<td style="padding:0 6px;">` +
                  `<a href="https://www.instagram.com/conectamos__/" target="_blank" style="display:block;">` +
                    `<img src="https://firmas-conectamos.vercel.app/instagram.svg" width="28" height="28" style="display:block;width:28px;height:28px;" alt="Instagram" />` +
                  `</a>` +
                `</td>` +
                `<td style="padding:0 6px;">` +
                  `<a href="https://www.linkedin.com/company/conectamosai" target="_blank" style="display:block;">` +
                    `<img src="https://firmas-conectamos.vercel.app/linkedin.svg" width="28" height="28" style="display:block;width:28px;height:28px;" alt="LinkedIn" />` +
                  `</a>` +
                `</td>` +
                `<td style="padding:0 6px;">` +
                  `<a href="https://www.facebook.com/p/Conectamos-M%C3%A9xico-61569813066235/" target="_blank" style="display:block;">` +
                    `<img src="https://firmas-conectamos.vercel.app/facebook.svg" width="28" height="28" style="display:block;width:28px;height:28px;" alt="Facebook" />` +
                  `</a>` +
                `</td>` +
              `</tr>` +
            `</table>` +
          `</td>` +
        `</tr>` +
      `</table>`;
    }

    function updatePreview() {
      document.getElementById('preview-box').innerHTML = generateSignatureHTML();
    }

    function switchTab(tab) {
      document.querySelectorAll('.photo-tab').forEach((el, i) => {
        el.classList.toggle('active', (i === 0) === (tab === 'file'));
      });
      document.getElementById('pane-file').classList.toggle('active', tab === 'file');
      document.getElementById('pane-url').classList.toggle('active', tab === 'url');
      setPhotoStatus('');
    }

    function setPhotoStatus(msg, isError) {
      const el = document.getElementById('photo-status');
      el.textContent = msg;
      el.className = 'photo-status' + (isError ? ' error' : '');
    }

    // ── Crop modal ────────────────────────────────────────────
    const CROP_SIZE = 240;
    let _cropSrc = '', _cropNW = 0, _cropNH = 0;
    let _cropZoom = 1, _cropMinZoom = 1;
    let _cropX = 0, _cropY = 0;
    let _dragging = false, _dStartX = 0, _dStartY = 0, _pStartX = 0, _pStartY = 0;

    function openCropModal(src) {
      _cropSrc = src;
      const img = new Image();
      img.onload = () => {
        _cropNW = img.naturalWidth;
        _cropNH = img.naturalHeight;
        _cropMinZoom = Math.max(CROP_SIZE / _cropNW, CROP_SIZE / _cropNH);
        _cropZoom = _cropMinZoom;
        _cropX = (CROP_SIZE - _cropNW * _cropZoom) / 2;
        _cropY = (CROP_SIZE - _cropNH * _cropZoom) / 2;
        const sl = document.getElementById('zoom-slider');
        sl.min = _cropMinZoom; sl.max = _cropMinZoom * 3; sl.step = 0.001; sl.value = _cropZoom;
        renderCrop();
        document.getElementById('crop-modal').classList.add('open');
      };
      img.src = src;
    }

    function renderCrop() {
      const el = document.getElementById('crop-img');
      el.src = _cropSrc;
      el.style.width  = (_cropNW * _cropZoom) + 'px';
      el.style.height = (_cropNH * _cropZoom) + 'px';
      el.style.left   = _cropX + 'px';
      el.style.top    = _cropY + 'px';
    }

    function clampPan() {
      _cropX = Math.min(0, Math.max(CROP_SIZE - _cropNW * _cropZoom, _cropX));
      _cropY = Math.min(0, Math.max(CROP_SIZE - _cropNH * _cropZoom, _cropY));
    }

    function cancelCrop() {
      document.getElementById('crop-modal').classList.remove('open');
    }

    function applyCrop() {
      const OUT = 110, scale = OUT / CROP_SIZE;
      const canvas = document.createElement('canvas');
      canvas.width = OUT; canvas.height = OUT;
      const ctx = canvas.getContext('2d');
      ctx.beginPath();
      ctx.arc(OUT / 2, OUT / 2, OUT / 2, 0, Math.PI * 2);
      ctx.clip();
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, _cropX * scale, _cropY * scale, _cropNW * _cropZoom * scale, _cropNH * _cropZoom * scale);
        photoData = canvas.toDataURL('image/png');
        setPhotoStatus('Foto ajustada ✓');
        updatePreview();
        cancelCrop();
      };
      img.src = _cropSrc;
    }

    function handleFileChange(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('file-label-text').textContent = file.name;
      const reader = new FileReader();
      reader.onload = e => openCropModal(e.target.result);
      reader.readAsDataURL(file);
    }

    function handleUrlLoad() {
      const url = document.getElementById('inp-url').value.trim();
      if (!url) return;
      setPhotoStatus('Cargando…');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const c = document.createElement('canvas');
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          c.getContext('2d').drawImage(img, 0, 0);
          openCropModal(c.toDataURL());
        } catch (_) {
          setPhotoStatus('Error CORS: usa "Subir archivo" en su lugar.', true);
        }
      };
      img.onerror = () => setPhotoStatus('No se pudo cargar la imagen. Verifica el URL.', true);
      img.src = url;
    }

    function copyFallback(html, onDone) {
      const el = document.createElement('div');
      el.innerHTML = html;
      el.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
      document.body.appendChild(el);
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      try { document.execCommand('copy'); } catch (_) {}
      sel.removeAllRanges();
      document.body.removeChild(el);
      onDone();
    }

    function copyHTML() {
      const html = generateSignatureHTML();
      const btn  = document.getElementById('btn-copy');

      function showCopied() {
        btn.textContent = '¡Copiado! ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copiar HTML para Gmail';
          btn.classList.remove('copied');
        }, 2000);
      }

      if (navigator.clipboard && window.ClipboardItem) {
        const blob = new Blob([html], { type: 'text/html' });
        navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })])
          .then(showCopied).catch(() => copyFallback(html, showCopied));
      } else {
        copyFallback(html, showCopied);
      }
    }

    ['inp-nombre', 'inp-area', 'inp-whatsapp'].forEach(id => {
      document.getElementById(id).addEventListener('input', updatePreview);
    });

    // Drag en el círculo de crop
    const cropCircle = document.getElementById('crop-circle');
    cropCircle.addEventListener('mousedown', e => {
      _dragging = true;
      _dStartX = e.clientX; _dStartY = e.clientY;
      _pStartX = _cropX;    _pStartY = _cropY;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!_dragging) return;
      _cropX = _pStartX + (e.clientX - _dStartX);
      _cropY = _pStartY + (e.clientY - _dStartY);
      clampPan(); renderCrop();
    });
    document.addEventListener('mouseup', () => { _dragging = false; });

    // Touch
    cropCircle.addEventListener('touchstart', e => {
      const t = e.touches[0];
      _dragging = true;
      _dStartX = t.clientX; _dStartY = t.clientY;
      _pStartX = _cropX;    _pStartY = _cropY;
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', e => {
      if (!_dragging) return;
      const t = e.touches[0];
      _cropX = _pStartX + (t.clientX - _dStartX);
      _cropY = _pStartY + (t.clientY - _dStartY);
      clampPan(); renderCrop();
    }, { passive: false });
    document.addEventListener('touchend', () => { _dragging = false; });

    // Zoom slider
    document.getElementById('zoom-slider').addEventListener('input', e => {
      const newZoom = parseFloat(e.target.value);
      const cx = CROP_SIZE / 2, cy = CROP_SIZE / 2;
      _cropX = cx - (cx - _cropX) * newZoom / _cropZoom;
      _cropY = cy - (cy - _cropY) * newZoom / _cropZoom;
      _cropZoom = newZoom;
      clampPan(); renderCrop();
    });

    updatePreview();
  </script>
</body>
</html>
